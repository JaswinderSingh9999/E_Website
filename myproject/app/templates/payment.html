<!DOCTYPE html>
<html>
<head>
    <title>Secure Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body style="margin:0; padding:0; font-family: Arial, sans-serif; background: linear-gradient(135deg,#0f2027,#2c5364); height:100vh; display:flex; align-items:center; justify-content:center;">

    <div style="background:#fff; width:350px; padding:30px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); text-align:center;">

        <!-- Logo / Title -->
        <h2 style="margin-bottom:10px; color:#333;">💳 Secure Payment</h2>
        <p style="color:#777; font-size:14px;">Complete your purchase safely</p>

        <!-- Amount Box -->
        <div style="background:#f5f7fa; padding:15px; border-radius:8px; margin:20px 0;">
            <p style="margin:0; font-size:14px; color:#555;">Amount to Pay</p>
            <h1 style="margin:5px 0; color:#2c5364;">₹{{ amount|floatformat:2 }}</h1>
        </div>

        <!-- Pay Button -->
        <button id="pay-btn"
            style="width:100%; padding:12px; border:none; border-radius:8px; background:#3399cc; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; transition:0.3s;">
            Pay Now
        </button>

        <!-- Secure Text -->
        <p style="margin-top:15px; font-size:12px; color:#888;">
            🔒 100% Secure Payment powered by Razorpay
        </p>

        <!-- Hidden Form -->
        <form id="razorpay-form" method="POST" action="{% url 'verify_payment' %}">
            {% csrf_token %}
            <input type="hidden" name="razorpay_order_id" value="{{ order_id }}">
            <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
            <input type="hidden" name="razorpay_signature" id="razorpay_signature">
        </form>
        <div class="product-buttons">
            <a href="/" class="btn-back">← Continue Shopping</a>
        </div>

    </div>

<script>
document.getElementById('pay-btn').onclick = function(e){

    var options = {
        "key": "{{ razorpay_key }}",
        "amount": "{{ amount }}",
        "currency": "INR",
        "name": "My Shop",
        "description": "Secure Payment",
        "order_id": "{{ order_id }}",

        "handler": function (response){
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_signature').value = response.razorpay_signature;
            document.getElementById('razorpay-form').submit();
        },

        "theme": {
            "color": "#3399cc"
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();

    e.preventDefault();
}
</script>

</body>
</html>
