<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.dashboard-box{
max-width:500px;
margin:auto;
margin-top:120px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.dashboard-box h1{
font-weight:600;
margin-bottom:15px;
}

.logout-btn{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="dashboard-box">

<h1>Welcome User 🎉</h1>

<p class="text-muted">
You have successfully logged in to your dashboard.
</p>

<a href="/" class="btn btn-danger logout-btn">
Logout
</a>

</div>

</div>

</body>
</html>
