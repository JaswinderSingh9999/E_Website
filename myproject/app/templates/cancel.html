<!DOCTYPE html>
<html>
<head>
    <title>Payment Cancelled</title>

    <style>
        body {
            font-family: Arial;
            background: #ffebee;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            padding: 40px;
            width: 400px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: red;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>❌ Payment Cancelled</h2>
    <p>Your payment was not completed.</p>

    <a href="/cart/" class="btn">Back to Cart</a>
</div>

</body>
</html>
